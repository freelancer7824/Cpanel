<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Level Setup Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Dark Cyberpunk Theme Palette --- */
        :root {
            --bg-body: #090a0f;
            --panel-card: #121420;
            --accent-neon: #00ffcc;
            --accent-hover: #00b38f;
            --text-main: #f1f3f9;
            --text-muted: #8a94a6;
            --card-border: rgba(255, 255, 255, 0.03);
            --input-bg: #1a1d30;
            --error-color: #ff3366;
            --success-color: #00ffcc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto;
        }

        /* --- Manager Card Layout --- */
        .manager-container {
            width: 100%;
            max-width: 550px;
            background: linear-gradient(145deg, #121420 0%, #0e1019 100%);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .manager-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .manager-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .manager-header p {
            color: var(--accent-neon);
            font-size: 12px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Form Inputs --- */
        .form-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 11.5px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }

        .input-block {
            display: flex;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 14px 16px;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .input-block:focus-within {
            border-color: rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.05);
        }

        .input-block i {
            color: var(--text-muted);
            font-size: 15px;
            width: 20px;
            text-align: center;
            transition: color 0.3s;
        }

        .input-block:focus-within i {
            color: var(--accent-neon);
        }

        .input-block input, .input-block select {
            flex-grow: 1;
            background: none;
            border: none;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
            -webkit-user-select: text;
            user-select: text;
        }

        .input-block select option {
            background-color: var(--panel-card);
            color: var(--text-main);
        }

        /* --- Trigger Button --- */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #00ffcc 0%, #00b38f 100%);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.15);
            margin-top: 25px;
        }

        .submit-btn:hover {
            transform: scale(0.99);
            opacity: 0.95;
        }

        .submit-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- Toast Notification --- */
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(18, 20, 32, 0.95);
            border: 1px solid var(--card-border);
            padding: 12px 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            backdrop-filter: blur(5px);
            border-left: 4px solid var(--success-color);
        }
        
        .toast-notification.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon { color: var(--success-color); font-size: 18px; }
        .toast-message { font-size: 13px; font-weight: 500; }

        @media (max-width: 480px) {
            .manager-container { padding: 25px 20px; border-radius: 20px; }
            .manager-header h1 { font-size: 20px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="toast" class="toast-notification">
        <i class="fa-solid fa-circle-check toast-icon"></i>
        <span class="toast-message" id="toast-text">VIP Configuration Saved Locally</span>
    </div>

    <div class="manager-container">
        <div class="manager-header">
            <h1>VIP Level Setup Manager</h1>
            <p>Configure System Access Tiers</p>
        </div>

        <form id="vip-config-form">
            <div class="form-group">
                <label class="input-label">Select VIP Level</label>
                <div class="input-block">
                    <i class="fa-solid fa-crown"></i>
                    <select id="vip-level" required>
                        <option value="" disabled selected>Choose a VIP Level</option>
                        <option value="VIP 1">VIP Level 1</option>
                        <option value="VIP 2">VIP Level 2</option>
                        <option value="VIP 3">VIP Level 3</option>
                        <option value="VIP 4">VIP Level 4</option>
                        <option value="VIP 5">VIP Level 5</option>
                        <option value="VIP 6">VIP Level 6</option>
                        <option value="VIP 7">VIP Level 7</option>
                        <option value="VIP 8">VIP Level 8</option>
                        <option value="VIP 9">VIP Level 9</option>
                        <option value="VIP 10">VIP Level 10</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="input-label">VIP Level Amount (Price)</label>
                <div class="input-block">
                    <i class="fa-solid fa-wallet"></i>
                    <input type="number" id="vip-amount" placeholder="Select level first..." required min="0">
                </div>
            </div>

            <div class="form-group">
                <label class="input-label">Daily Earning Amount</label>
                <div class="input-block">
                    <i class="fa-solid fa-money-bill-trend-up"></i>
                    <input type="number" id="daily-earning" placeholder="e.g. 0.1 or 5.5" required min="0" step="any">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <i class="fa-solid fa-cloud-arrow-up"></i> <span id="btn-text">Save VIP Level Matrix</span>
            </button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="https://cpanel-ebon.vercel.app/Royal%20Task/royaltaskroyaltaskroyaltask.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Firebase Initialize Checking
            if (typeof firebaseConfig !== 'undefined') {
                firebase.initializeApp(firebaseConfig);
            } else {
                alert("Configuration Error: config.js missing!");
                return;
            }

            const database = firebase.database();
            const vipForm = document.getElementById('vip-config-form');
            const selectLevel = document.getElementById('vip-level');
            const inputAmount = document.getElementById('vip-amount');
            const inputEarning = document.getElementById('daily-earning');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            function showToast(message) {
                const toast = document.getElementById('toast');
                document.getElementById('toast-text').textContent = message;
                toast.classList.add('active');
                setTimeout(() => toast.classList.remove('active'), 3000);
            }

            // লেভেল সিলেক্ট করলে ডাটাবেজ থেকে ডাটা নিয়ে আসার লজিক (Fetch & Edit)
            selectLevel.addEventListener('change', () => {
                const selectedLevel = selectLevel.value;
                if(!selectedLevel) return;

                btnText.textContent = "Checking Server Matrix...";
                submitBtn.disabled = true;

                // ফায়ারবেস থেকে ডাটা একবার রিড করবে (.once)
                database.ref('vip_settings/' + selectedLevel).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        // ডাটা থাকলে ইনপুটে সেট হবে
                        inputAmount.value = data.amount || "";
                        inputEarning.value = data.daily_earning || "";
                        btnText.textContent = `Update ${selectedLevel} Matrix`;
                    } else {
                        // ডাটা না থাকলে ইনপুট ফাকা হবে নতুন সেটআপের জন্য
                        inputAmount.value = "";
                        inputEarning.value = "";
                        btnText.textContent = `Save ${selectedLevel} Matrix`;
                    }
                })
                .catch((error) => {
                    console.error("Fetch Error: ", error);
                })
                .finally(() => {
                    submitBtn.disabled = false;
                });
            });

            // Form Submit Logic (Save/Update)
            vipForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const level = selectLevel.value;
                const amount = inputAmount.value;
                const dailyEarning = inputEarning.value;

                if(!level) {
                    alert("Please select a VIP level first!");
                    return;
                }

                // বাটন লোডিং স্টেট
                submitBtn.disabled = true;
                btnText.textContent = "Updating Matrix Data...";

                // ফায়ারবেস ডাটাবেজের 'vip_settings/VIP X' পাথে রাইট হবে
                database.ref('vip_settings/' + level).set({
                    level_name: level,
                    amount: Number(amount),
                    daily_earning: Number(dailyEarning), // ডেসিমাল ডাটা ফায়ারবেসে ফ্লোট হিসেবে যাবে
                    last_updated: firebase.database.ServerValue.TIMESTAMP
                })
                .then(() => {
                    showToast(`${level} Matrix Configured Successfully!`);
                    vipForm.reset();
                    btnText.textContent = "Save VIP Level Matrix";
                })
                .catch((error) => {
                    console.error("Firebase Database Error: ", error);
                    alert("Error updating server: " + error.message);
                    btnText.textContent = "Save VIP Level Matrix";
                })
                .finally(() => {
                    submitBtn.disabled = false;
                });
            });
        });
    </script>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
    </script>
</body>
</html>
